<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw - 多渠道安装向导</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white mb-2">OpenClaw <span id="title-accent" class="text-blue-400">飞书</span> 安装向导</h1>
      <p id="page-subtitle" class="text-gray-400">自动创建飞书应用并配置 OpenClaw 连接</p>
    </div>

    <div id="preflight-alerts" class="mb-6 hidden"></div>

    <div id="resume-banner" class="mb-6 hidden bg-yellow-900/30 border border-yellow-700 rounded-lg p-4">
      <p class="text-yellow-300 font-medium">检测到上次未完成的安装</p>
      <p class="text-yellow-400/80 text-sm mt-1" id="resume-detail"></p>
      <div class="mt-3 flex flex-wrap gap-3">
        <button onclick="resumeInstall()" class="px-4 py-1.5 bg-yellow-600 hover:bg-yellow-500 text-white rounded text-sm font-medium">继续安装</button>
        <button onclick="freshInstall()" class="px-4 py-1.5 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-medium">重新开始</button>
        <button id="resume-clear-login-btn" onclick="clearLoginData()" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 text-white rounded text-sm font-medium">清空飞书登录</button>
      </div>
    </div>

    <div id="setup-form" class="bg-gray-900 rounded-xl border border-gray-800 p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">接入信息</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">接入渠道 <span class="text-red-400">*</span></label>
          <select id="channel-select" onchange="handleChannelChange()"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500">
            <option value="feishu">飞书</option>
            <option value="wecom">企业微信</option>
          </select>
        </div>

        <div id="feishu-fields" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">应用名称 <span class="text-red-400">*</span></label>
            <input type="text" id="app-name" placeholder="例如: MyClaw Bot"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">应用描述 <span class="text-gray-600">(可选)</span></label>
            <input type="text" id="app-desc" placeholder="Powered by OpenClaw"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
          </div>
        </div>

        <div>
          <label id="bot-name-label" class="block text-sm text-gray-400 mb-1">机器人名称 <span id="bot-name-required" class="text-red-400">*</span></label>
          <input type="text" id="bot-name" placeholder="例如: OpenClaw 助手"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
        </div>

        <div id="wecom-fields" class="space-y-4 hidden">
          <input type="hidden" id="wecom-bot-id">
          <input type="hidden" id="wecom-bot-secret">
          <div class="rounded-lg border border-emerald-900/60 bg-emerald-950/30 p-4 text-sm text-emerald-100">
            <p class="font-medium text-emerald-300">企业微信全自动接入</p>
            <p class="mt-2 text-emerald-100/80">开始后会自动弹出企业微信管理后台，等待你扫码登录，然后自动创建 API 长连接机器人、抓取 Bot ID / Secret、写入 OpenClaw 并重启 Gateway。</p>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">WebSocket 地址 <span class="text-gray-600">(可选)</span></label>
            <input type="text" id="wecom-websocket-url" placeholder="默认 wss://openws.work.weixin.qq.com"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500">
          </div>
          <div class="text-xs text-gray-500">
            如果你只是想重新写入已有凭证，可以在断点恢复后从 `configure_openclaw` 开始，隐藏字段会沿用上次抓到的 Bot ID / Secret。
          </div>
        </div>

        <div class="pt-2 border-t border-gray-800">
          <p class="text-sm font-medium text-gray-300 mb-3">模块化执行</p>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-gray-400 mb-1">从步骤开始</label>
              <select id="start-phase"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500">
                <option value="">自动续跑 / 从断点继续</option>
              </select>
            </div>
            <div>
              <label class="block text-sm text-gray-400 mb-1">执行到步骤</label>
              <select id="end-phase"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500">
                <option value="">直到执行完成</option>
              </select>
            </div>
          </div>

          <div id="feishu-recovery-fields" class="grid md:grid-cols-2 gap-4 mt-4">
            <div>
              <label class="block text-sm text-gray-400 mb-1">已有 App ID <span class="text-gray-600">(可选)</span></label>
              <input type="text" id="existing-app-id" placeholder="从中间步骤启动时可填写"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            <div>
              <label class="block text-sm text-gray-400 mb-1">已有 App Secret <span class="text-gray-600">(可选)</span></label>
              <input type="password" id="existing-app-secret" placeholder="仅 configure_openclaw 及之后需要"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
          </div>

          <label id="clear-login-row" class="mt-4 flex items-start gap-3 text-sm text-gray-300">
            <input type="checkbox" id="clear-login" class="mt-1 rounded border-gray-700 bg-gray-800 text-blue-500 focus:ring-blue-500">
            <span id="clear-login-text">启动前强制清空浏览器 cookies，重新扫码登录飞书</span>
          </label>

          <div class="mt-3 flex flex-wrap gap-3">
            <button type="button" id="clear-login-btn" onclick="clearLoginData()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-medium">
              清空飞书登录信息
            </button>
            <button type="button" onclick="resetSavedState()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-lg text-sm font-medium">
              清空断点状态
            </button>
          </div>
        </div>

        <button onclick="startInstall()" id="start-btn"
          class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors">
          开始安装
        </button>
      </div>
    </div>

    <div id="progress-section" class="hidden">
      <div class="bg-gray-900 rounded-xl border border-gray-800 p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">安装进度</h2>
        <div id="phases" class="space-y-3"></div>
      </div>

      <div id="action-buttons" class="flex gap-3 mb-6 hidden">
        <button onclick="retryPhase()" id="retry-btn"
          class="flex-1 py-2.5 bg-yellow-600 hover:bg-yellow-500 text-white font-medium rounded-lg">
          重试当前步骤
        </button>
        <button onclick="cancelInstall()" id="cancel-btn"
          class="flex-1 py-2.5 bg-red-800 hover:bg-red-700 text-white font-medium rounded-lg">
          取消
        </button>
      </div>

      <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
        <h2 class="text-lg font-semibold mb-3">日志</h2>
        <div id="log" class="font-mono text-xs text-gray-400 max-h-60 overflow-y-auto space-y-1"></div>
      </div>
    </div>

    <div id="done-section" class="hidden">
      <div id="done-card" class="bg-gray-900 rounded-xl border p-6 text-center">
        <div id="done-icon" class="text-5xl mb-3"></div>
        <h2 id="done-title" class="text-xl font-bold mb-2"></h2>
        <p id="done-message" class="text-gray-400"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
